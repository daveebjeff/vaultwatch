vault:
  address: "https://vault.example.com"
  token: ""  # or set VAULT_TOKEN env var

monitor:
  interval: 5m
  warn_before: 24h
  paths:
    - path: "secret/data/db/prod"
      lease_id: ""
    - path: "secret/data/api/key"
      lease_id: ""

notify:
  log:
    enabled: true
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
  email:
    enabled: false
    host: "smtp.example.com"
    port: 587
    username: "alerts@example.com"
    password: ""
    from: "alerts@example.com"
    to:
      - "ops@example.com"
